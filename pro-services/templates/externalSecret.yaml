{{- if .Values.externalSecret.enabled }}
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ include "pro-services.fullname" . }}-secret
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "pro-services.labels" . | nindent 4 }}
spec:
  refreshInterval: {{ .Values.externalSecret.refreshInterval | quote }}
  secretStoreRef:
    name: {{ .Values.externalSecret.secretStoreRef.name }}
    kind: {{ .Values.externalSecret.secretStoreRef.kind }}
  target:
    name: {{ .Values.externalSecret.target.name | default (include "pro-services.fullname" .) }}-secret
    creationPolicy: {{ .Values.externalSecret.target.creationPolicy }}
    {{- if .Values.externalSecret.target.template }}
    template:
      metadata:
        labels:
          {{- include "pro-services.labels" . | nindent 10 }}
        annotations:
          {{- toYaml .Values.externalSecret.target.template.annotations | nindent 10 }}
      type: {{ .Values.externalSecret.target.template.type }}
      data:
        {{- toYaml .Values.externalSecret.target.template.data | nindent 8 }}
    {{- end }}
  {{- if .Values.externalSecret.data }}
  data:
    {{- toYaml .Values.externalSecret.data | nindent 4 }}
  {{- end }}
  {{- if .Values.externalSecret.dataFrom }}
  dataFrom:
    {{- toYaml .Values.externalSecret.dataFrom | nindent 4 }}
  {{- end }}
{{- end }}
