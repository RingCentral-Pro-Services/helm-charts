# Example: Using External Secrets with pro-services Helm Chart
# This shows how to fetch secrets from AWS Secrets Manager using External Secrets Operator

replicaCount: 3

image:
  repository: 256329341370.dkr.ecr.us-east-2.amazonaws.com/my-app
  tag: "1.0.0"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 8080

ingress:
  enabled: true
  ingressClassName: alb
  hosts:
    - host: test-app.ps.ringcentral.com
      paths:
        - path: /
          pathType: Prefix
  annotations:
    kubernetes.io/ingress.class: "alb"
    alb.ingress.kubernetes.io/scheme: "internet-facing"
    alb.ingress.kubernetes.io/target-type: "ip"
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP":80}]'

# Configuration values injected as environment variables
config:
  NODE_ENV: staging
  API_ENDPOINT: "https://api.ps.ringcentral.com"
  LOG_LEVEL: info

# Example 1: Extract entire secret JSON from AWS Secrets Manager
# The secret at /psi/staging/test-app should contain JSON like:
# {
#   "database_url": "postgresql://...",
#   "api_key": "secret-key-123",
#   "oauth_token": "token-xyz"
# }
externalSecret:
  enabled: true
  refreshInterval: "1m"
  secretStoreRef:
    name: aws-secretsmanager
    kind: ClusterSecretStore
  target:
    name: test-app-secrets      # K8s Secret name: test-app-secrets
    creationPolicy: Owner
  dataFrom:
    - extract:
        key: "/psi/staging/test-app"  # AWS Secrets Manager path

---
# Example 2: Selective key mapping from AWS Secrets Manager
# Use this if you only want specific properties from the secret
externalSecret:
  enabled: true
  refreshInterval: "5m"
  secretStoreRef:
    name: aws-secretsmanager
    kind: ClusterSecretStore
  target:
    name: app-creds
    creationPolicy: Owner
  data:
    # Map specific fields from AWS secret to K8s Secret keys
    - secretKey: DB_URL
      remoteRef:
        key: "/psi/staging/database"
        property: connection_string
    - secretKey: API_KEY
      remoteRef:
        key: "/psi/staging/api-keys"
        property: default_key
    - secretKey: SLACK_WEBHOOK
      remoteRef:
        key: "/psi/staging/notifications"
        property: slack_webhook_url

---
# Example 3: Using templated secret transformation
# Transform the fetched secret before creating the K8s Secret
externalSecret:
  enabled: true
  refreshInterval: "1m"
  secretStoreRef:
    name: aws-secretsmanager
    kind: ClusterSecretStore
  target:
    name: app-config
    creationPolicy: Owner
    template:
      type: Opaque
      # Transform raw data into a config file format
      data:
        config.json: |
          {
            "database": {{ .database_url }},
            "api_key": {{ .api_key }},
            "features": {
              "auth": true,
              "logging": true
            }
          }
  dataFrom:
    - extract:
        key: "/psi/staging/test-app"
